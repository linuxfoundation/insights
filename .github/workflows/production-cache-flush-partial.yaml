name: Production Cache Flush (Partial)

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Flush by project slug or collection slug'
        required: true
        type: choice
        options:
          - project
          - collection
          - leaderboards
      slug:
        description: 'The project or collection slug to flush (not required for leaderboards)'
        required: false
        type: string

permissions:
  contents: read

env:
  ORACLE_USER: ${{ secrets.ORACLE_USER }}
  ORACLE_TENANT: ${{ secrets.ORACLE_TENANT }}
  ORACLE_REGION: ${{ secrets.ORACLE_REGION }}
  ORACLE_FINGERPRINT: ${{ secrets.ORACLE_FINGERPRINT }}
  ORACLE_KEY: ${{ secrets.ORACLE_KEY }}
  ORACLE_KEY_PASSPHRASE: ${{ secrets.ORACLE_KEY_PASSPHRASE }}
  ORACLE_CLUSTER: ${{ secrets.ORACLE_PRODUCTION_CLUSTER }}
  KUBECONFIG_PATH: /home/runner/.kube/config
  SUPPRESS_LABEL_WARNING: 'True'

jobs:
  flush-partial-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh > install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "OCI_CLI_DIR=/home/runner/bin" >> $GITHUB_ENV

      - name: Update PATH
        run: echo "${{ env.OCI_CLI_DIR }}" >> $GITHUB_PATH

      - name: Configure Oracle Cloud CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ env.ORACLE_KEY }}" | base64 --decode > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ env.ORACLE_USER }}" >> ~/.oci/config
          echo "fingerprint=${{ env.ORACLE_FINGERPRINT }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "tenancy=${{ env.ORACLE_TENANT }}" >> ~/.oci/config
          echo "region=${{ env.ORACLE_REGION }}" >> ~/.oci/config
          echo "pass_phrase=${{ env.ORACLE_KEY_PASSPHRASE }}" >> ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Verify OCI CLI Configuration
        run: |
          oci os ns get --config-file ~/.oci/config > /dev/null 2>&1 || { echo "OCI config verification failed"; exit 1; }

      - name: Get Cluster Kubeconfig
        run: |
          oci ce cluster create-kubeconfig --cluster-id ${{ env.ORACLE_CLUSTER }} --file ${{ env.KUBECONFIG_PATH }} --region ${{ env.ORACLE_REGION }} --token-version 2.0.0  --kube-endpoint PUBLIC_ENDPOINT --overwrite

      - name: Flush cache
        env:
          TYPE: ${{ inputs.type }}
          SLUG: ${{ inputs.slug }}
        run: |
          REDIS_URL=$(kubectl get configmap insights-config-map -n insights -o jsonpath="{.data.NUXT_REDIS_URL}")
          REDIS_PASS=$(echo "$REDIS_URL" | sed -n 's|.*://:\([^@]*\)@.*|\1|p')

          flush_project() {
            local PROJECT=$1
            local STRIPPED="${PROJECT//[-_.]/}"
            local PROJECT_KEY="${STRIPPED:0:6}"
            echo "Flushing cache for project: $PROJECT (key prefix: $PROJECT_KEY)"
            kubectl exec -i redis-client -n insights -- \
              sh -c "redis-cli -h redis-svc -a \"$REDIS_PASS\" --scan --pattern \"*project${PROJECT_KEY}*\" 2>/dev/null | xargs -r redis-cli -h redis-svc -a \"$REDIS_PASS\" DEL 2>/dev/null"
          }

          if [ "$TYPE" = "project" ] || [ "$TYPE" = "collection" ]; then
            if [ -z "$SLUG" ]; then
              echo "Error: slug is required for type '$TYPE'"
              exit 1
            fi
          fi

          if [ "$TYPE" = "project" ]; then
            flush_project "$SLUG"

          elif [ "$TYPE" = "collection" ]; then
            TINYBIRD_URL=$(kubectl get configmap insights-config-map -n insights -o jsonpath="{.data.NUXT_TINYBIRD_BASE_URL}")
            TINYBIRD_TOKEN=$(kubectl get configmap insights-config-map -n insights -o jsonpath="{.data.NUXT_TINYBIRD_TOKEN}")

            PAGE=0
            PAGE_SIZE=100
            TOTAL_FLUSHED=0

            while true; do
              if ! RESPONSE=$(curl -sf \
                -H "Authorization: Bearer $TINYBIRD_TOKEN" \
                "${TINYBIRD_URL}/v0/pipes/projects_list.json?collectionSlug=${SLUG}&pageSize=${PAGE_SIZE}&page=${PAGE}"); then
                echo "Error: curl failed for collection page $PAGE (HTTP error or network issue)"
                exit 1
              fi

              SLUGS=$(echo "$RESPONSE" | jq -r '.data[].slug')
              ROWS=$(echo "$RESPONSE" | jq -r '.rows')

              if [ -z "$SLUGS" ] && [ "$PAGE" -eq 0 ]; then
                echo "No projects found for collection: $SLUG"
                exit 1
              fi

              if ! [[ "$ROWS" =~ ^[0-9]+$ ]]; then
                echo "Error: unexpected .rows value '$ROWS' on page $PAGE"
                exit 1
              fi

              for PROJECT in $SLUGS; do
                flush_project "$PROJECT"
                TOTAL_FLUSHED=$((TOTAL_FLUSHED + 1))
              done

              if [ "$ROWS" -lt "$PAGE_SIZE" ]; then
                break
              fi

              PAGE=$((PAGE + 1))
            done

            echo "Done. Flushed cache for $TOTAL_FLUSHED projects."

          elif [ "$TYPE" = "leaderboards" ]; then
            echo "Flushing all leaderboard cache keys"
            kubectl exec -i redis-client -n insights -- \
              sh -c "redis-cli -h redis-svc -a \"$REDIS_PASS\" --scan --pattern \"*leaderboard*\" 2>/dev/null | xargs -r redis-cli -h redis-svc -a \"$REDIS_PASS\" DEL 2>/dev/null"
            echo "Done."
          fi
