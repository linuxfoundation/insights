packages:
  - 'submodules/crowd.dev/services/libs/*'
  - 'submodules/crowd.dev/services/archetypes/*'
  - 'workers'
  - 'workers/*'
  - 'workers/temporal/*'
  - 'frontend'
  - 'services'

overrides:
  eslint-plugin-vue: ^10.2.0
  h3: 1.15.5
  '@nuxtjs/robots': ^5.7.0
  form-data: '>=4.0.4' # GHSA-fjxv-7rqg-78g4
  shell-quote: '>=1.8.4' # GHSA-w7jw-789q-3m8p
  protobufjs: '>=7.5.5 <8' # GHSA-xq3m-2v4x-88gg
  simple-git: '>=3.32.3' # GHSA-r275-fr43-pm7q
  fast-xml-parser@5: '>=5.7.0' # GHSA-m7jm-9gc2-mpf2 (5.x line only; 4.x deferred, needs-human)
  '@grpc/grpc-js': '>=1.13.5 <2' # GHSA-5375-pq7m-f5r2, GHSA-99f4-grh7-6pcq
  '@hono/node-server': '>=1.19.10 <2' # GHSA-wc8c-qw6v-h7f6
  '@isaacs/brace-expansion': '>=5.0.1 <6' # GHSA-7h2j-956f-4vf2
  hono: '>=4.12.25 <5' # GHSA-88fw-hqm2-52qc and stacked hono CVEs
  express-rate-limit: '>=8.2.2 <9' # GHSA-46wh-pxpv-q5gq
  fast-uri: '>=3.1.2 <4' # GHSA-q3j6-qgpj-74h6, GHSA-v39h-62p7-jpjc
  path-to-regexp@8: '>=8.4.0 <9' # GHSA-j3q9-mxjg-w52f (8.x line only; 0.1.x is submodule-origin via dd-trace)
  node-forge: '>=1.4.0 <2' # GHSA-2328-f5f3-gj25, GHSA-554w-wpv2-vw27, GHSA-5gfm-wpxj-wjgq, GHSA-5m6q-g25r-mvwx, GHSA-ppp5-5v6c-4jwp, GHSA-q67f-28xg-22rw
  flatted: '>=3.4.2 <4' # GHSA-25h7-pfq9-p65f, GHSA-rf6f-7fwh-wjgh
  tar: '>=7.5.11 <8' # stacked GHSAs, see CHANGELOG 7.5.3-7.5.11
  preact: '>=10.27.3 <11' # GHSA-36hm-qxxp-pg3m
  glob@10: '>=10.5.0 <11' # GHSA-5j98-mcp5-4vw2 (10.x line only; 6.x/7.x predate the vulnerable CLI flag)
  ws: '>=8.21.0 <9' # GHSA-96hv-2xvq-fx4p
  immutable: '>=5.1.5 <6' # GHSA-wf6x-7x77-mvgw
  js-cookie: '>=3.0.7 <4' # GHSA-qjx8-664m-686j
  happy-dom: '>=20.8.9 <21' # GHSA-6q6h-j7hj-3r64, GHSA-w4gp-fjgq-3q4g
  defu: '>=6.1.5 <7' # GHSA-737v-mqg7-c878
  koa: '>=2.16.4 <3' # GHSA-7gcc-r8m5-44qm
  svgo@3: '>=3.3.3 <4' # GHSA-xpqw-6gx7-v673 (3.x line)
  svgo@4: '>=4.0.1 <5' # GHSA-xpqw-6gx7-v673 (4.x line)
  picomatch@2: '>=2.3.2 <3' # GHSA-c2c7-rcm5-vvqj (2.x line)
  picomatch@4: '>=4.0.4 <5' # GHSA-c2c7-rcm5-vvqj (4.x line)
  minimatch@3: '>=3.1.4 <4' # GHSA-23c5-xmqv-rm74, GHSA-3ppc-4f35-3m26, GHSA-7r86-cg39-jmmj (3.x line)
  minimatch@5: '>=5.1.8 <6' # same GHSAs (5.x line)
  minimatch@9: '>=9.0.7 <10' # same GHSAs (9.x line; editorconfig@1.0.4 exact-pinned 9.0.1 but API surface unchanged 9.0.1->9.0.7, verified via upstream diff)
  minimatch@10: '>=10.2.3 <11' # same GHSAs (10.x line)
  rollup@2: '>=2.80.0 <3' # GHSA-mw96-cpmx-2vgc (2.x line; 4.x deferred, needs-human — shares resolution with production nuxt build)
  lodash: '>=4.18.1 <5' # GHSA stacked (<=4.17.23); 4.18.0 is npm-deprecated "bad release", use 4.18.1
  storybook: '>=8.6.17 <9' # GHSA (8.1.0-8.6.16); @nuxtjs/storybook@8.3.3 exact-pins 8.4.7, needs manual pnpm storybook / storybook:build check
  terser-webpack-plugin: '>=5.6.1 <6' # dev-only (webpack's own minifier dep); 5.3.17+ dropped serialize-javascript entirely, removing the vulnerable pin
  serialize-javascript: '>=7.0.5 <8' # GHSA (CVE-2026-34043); @rollup/plugin-terser@0.4.4 declares ^6.0.1 but only calls the stable default export, API unchanged across the major
